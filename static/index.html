<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影片字幕翻譯系統</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<style>
    .editor-header {
        display: flex;
    }

    .editor-header .btn span {
        white-space: nowrap
    }
</style>
<body>
    <div class="container">
        <!-- 上傳區 -->
        <section id="upload-section" class="section">
            <header class="hero">
                <h1>影片字幕翻譯</h1>
                <p class="subtitle">自動生成多語言字幕，簡單快速</p>
            </header>

            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept=".mp4,.avi,.mov,.mkv" hidden>
                <div class="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p class="upload-text">點擊或拖曳影片到此處</p>
                    <p class="upload-hint">支援 MP4, AVI, MOV, MKV · 最大 5GB · 最長 2 小時</p>
                </div>
            </div>
            
            <div class="language-selection">
                <h3>選擇翻譯語言</h3>
                <div class="language-checkboxes">
                    <label class="checkbox-label">
                        <input type="checkbox" name="target-language" value="zh-TW" checked>
                        <span>繁體中文</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="target-language" value="zh-CN" checked>
                        <span>簡體中文</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="target-language" value="ms" checked>
                        <span>Bahasa Melayu</span>
                    </label>
                </div>
            </div>
            
            <button id="upload-btn" class="btn btn-primary" disabled>開始處理</button>
        </section>

        <!-- 進度區 -->
        <section id="progress-section" class="section" style="display: none;">
            <div class="progress-container">
                <h2>處理中</h2>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <p id="progress-text" class="progress-text">0%</p>
                <p id="stage-text" class="stage-text">準備中...</p>
            </div>
        </section>

        <!-- 結果區 -->
        <section id="result-section" class="section" style="display: none;">
            <h2>完成</h2>
            
            <!-- 影片播放器 -->
            <div class="video-container" id="video-container">
                <video id="video-player" controls>
                    <track id="video-track-primary" kind="subtitles" srclang="en" label="English">
                    <track id="video-track-secondary" kind="subtitles" srclang="" label="">
                    您的瀏覽器不支援影片播放。
                </video>
                <!-- 自定義字幕疊加層 -->
                <div id="custom-subtitle-overlay" class="custom-subtitle-overlay">
                    <div id="primary-subtitle-text" class="primary-subtitle-text"></div>
                    <div id="secondary-subtitle-text" class="secondary-subtitle-text"></div>
                </div>
                <!-- 畫中畫觸發提示 -->
                <div id="pip-hint" class="pip-hint">
                    ↓ 繼續向下滾動啟用畫中畫模式
                </div>
            </div>
            
            <!-- 字幕顯示設置 -->
            <div class="subtitle-settings">
                <h3>字幕顯示設置</h3>
                <div class="subtitle-mode-toggle">
                    <label class="radio-label">
                        <input type="radio" name="subtitle-mode" value="single" checked>
                        <span>單語言</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="subtitle-mode" value="dual">
                        <span>雙語</span>
                    </label>
                </div>
                <div id="single-language-controls" class="language-controls">
                    <select id="primary-subtitle-select" class="subtitle-select">
                        <option value="">無字幕</option>
                    </select>
                </div>
                <div id="dual-language-controls" class="language-controls" style="display: none;">
                    <div class="dual-select-group">
                        <div class="select-wrapper">
                            <label>主語言</label>
                            <select id="primary-subtitle-select-dual" class="subtitle-select">
                                <option value="">選擇語言</option>
                            </select>
                        </div>
                        <div class="select-wrapper">
                            <label>副語言</label>
                            <select id="secondary-subtitle-select" class="subtitle-select">
                                <option value="">選擇語言</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 下載區 -->
            <div class="download-section">
                <h3>下載字幕</h3>
                
                <!-- 單語言下載 -->
                <div class="download-subsection">
                    <h4 class="subsection-title">單語言下載</h4>
                    <div id="download-cards" class="download-cards"></div>
                </div>
                
                <!-- 分隔線 -->
                <div class="section-divider"></div>
                
                <!-- 合併字幕下載 -->
                <div class="download-subsection">
                    <h4 class="subsection-title">合併字幕下載</h4>
                    <p class="subsection-hint">選擇 2-3 種語言合併為單一字幕檔案（垂直排列）</p>
                    <p class="subsection-note">💡 合併字幕適用於 VLC、PotPlayer 等播放器，適合語言學習和離線觀看。不支持網頁原生播放。</p>
                    
                    <div class="merge-language-cards" id="merge-language-cards"></div>
                    
                    <div id="merge-selection-hint" class="merge-hint">請選擇 2-3 種語言</div>
                    
                    <div class="merge-controls">
                        <div class="merge-format-group">
                            <label class="control-label">格式</label>
                            <select id="merge-format-select" class="format-select">
                                <option value="vtt">VTT 格式</option>
                                <option value="srt" selected>SRT 格式</option>
                            </select>
                        </div>
                        <button id="generate-merged-btn" class="btn btn-secondary" disabled>
                            生成合併字幕
                        </button>
                    </div>
                </div>
                
                <!-- 分隔線 -->
                <div class="section-divider"></div>
                
                <!-- 批量下載 -->
                <div class="download-subsection">
                    <h4 class="subsection-title">批量下載</h4>
                    <div class="batch-download">
                        <button id="batch-download-btn" class="btn btn-secondary">
                            下載所有字幕（ZIP）
                        </button>
                        <label class="checkbox-label">
                            <input type="checkbox" id="include-video-checkbox">
                            <span>包含影片</span>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- 編輯器 -->
            <div class="editor-section">
                <div class="editor-header">
                    <h3>編輯字幕</h3>
                    <div class="editor-controls">
                        <button id="track-playback-btn" class="btn btn-secondary btn-small track-btn" title="開啟後，編輯器會自動滾動到當前播放的字幕">
                            <span class="track-icon">👁️</span>
                            <span class="smalltext">追蹤播放</span>
                        </button>
                        <select id="edit-language-select" class="language-select"></select>
                        <button id="add-language-btn" class="btn btn-secondary btn-small" title="添加第二語言進行對照編輯">+ 語言</button>
                        <button id="save-subtitles-btn" class="btn btn-primary btn-small">儲存</button>
                        <button id="reset-subtitles-btn" class="btn btn-secondary btn-small">重置</button>
                    </div>
                </div>
                <div id="subtitle-editor-area" class="subtitle-editor-area"></div>
            </div>
        </section>

        <!-- 通知訊息 -->
        <div id="notification" class="notification" style="display: none;"></div>
        
        <!-- 畫中畫容器 -->
        <div id="pip-container" class="pip-container">
            <button id="pip-close-btn" class="pip-close-btn" title="關閉畫中畫">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <video id="pip-video" controls></video>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
